<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Λ И G E Я | Official</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* المنيو العلوية */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .nav-icons { display: flex; gap: 15px; }
        .nav-logo img { height: 25px; }

        /* منطقة الصورة الكبيرة */
        .hero {
            width: 100%;
            height: 85vh; /* سيبنا مساحة للشريط تحت */
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        /* الشريط المتحرك (Marquee) */
        .marquee-container {
            width: 100%;
            background-color: #000;
            border-top: 1px solid #333;
            padding: 15px 0;
            overflow: hidden;
            white-space: nowrap;
            position: fixed;
            bottom: 60px; /* مكان الشريط قبل الزراير اللي تحت */
        }

        .marquee-text {
            display: inline-block;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* الأزرار السفلية (زي الفيديو) */
        .footer-buttons {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: #000;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: 1px solid #fff;
            background: #fff;
            color: #000;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .btn-outline {
            background: transparent;
            color: #fff;
        }

    </style>
</head>
<body>

    <nav>
        <div class="menu-icon">☰</div>
        <div class="nav-logo"><img src="logo.png" alt="Logo"></div>
        <div class="nav-icons">👤 🛍️</div>
    </nav>

    <div class="hero"></div>

    <div class="marquee-container">
        <div class="marquee-text">
            𝖂𝖊𝖑𝖈𝖔𝖒𝖊 𝖙𝖔 𝖙𝖍𝖊 𝕬𝖇𝖞𝖘𝖘. 𝖂𝖊 𝖍𝖆𝖛𝖊 𝖇𝖊𝖊𝖓 𝖊𝖝𝖕𝖊𝖈𝖙𝖎𝖓𝖌 𝖞𝖔𝖚. &nbsp;&nbsp; 
            𝖂𝖊𝖑𝖈𝖔𝖒𝖊 𝖙𝖔 𝖙𝖍𝖊 𝕬𝖇𝖞𝖘𝖘. 𝖂𝖊 𝖍𝖆𝖛𝖊 𝖇𝖊𝖊𝖓 𝖊𝖝𝖕𝖊𝖈𝖙𝖎𝖓𝖌 𝖞𝖔𝖚. &nbsp;&nbsp;
            𝖂𝖊𝖑𝖈𝖔𝖒𝖊 𝖙𝖔 𝖙𝖍𝖊 𝕬𝖇𝖞𝖘𝖘. 𝖂𝖊 𝖍𝖆𝖛𝖊 𝖇𝖊𝖊𝖓 𝖊𝖝𝖕𝖊𝖈𝖙𝖎𝖓𝖌 𝖞𝖔𝖚.
        </div>
    </div>

    <div class="footer-buttons">
        <a href="#" class="btn">Shop Now</a>
        <a href="#" class="btn btn-outline">Explore</a>
    </div>

</body>
</html>
