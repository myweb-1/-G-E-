<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Λ И G E Я</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الترويسة والقوائم كما هي -->
    <nav class="navbar">
        <div class="nav-center"><div class="nav-brand-text">Λ И G E Я</div></div>
    </nav>

    <!-- منطقة البنطلونات المحدثة -->
    <section class="collection-section">
        <h2 class="collection-title">THE PANTS DROP</h2>
        <div class="products-grid">
            
            <!-- Pants 1 -->
            <div class="product-card" onclick="openProductModal(11, 'COMPRESSION PANTS 01', 550, 'pants1-black.jpg', 'pants1-Grey.jpg', true, 'pants1')">
                <div class="product-img-box"><img src="pants1-black.jpg" alt="Pants 01"></div>
                <div class="product-details"><div class="product-card-title">COMPRESSION PANTS 01</div></div>
            </div>

            <!-- Pants 01 -->
            <div class="product-card" onclick="openProductModal(12, 'COMPRESSION PANTS 02', 550, 'pants01-black.jpg', 'pants01-Grey.jpg', true, 'pants01')">
                <div class="product-img-box"><img src="pants01-black.jpg" alt="Pants 02"></div>
                <div class="product-details"><div class="product-card-title">COMPRESSION PANTS 02</div></div>
            </div>

            <!-- Pants 02 -->
            <div class="product-card" onclick="openProductModal(13, 'COMPRESSION PANTS 03', 550, 'pants02-black.jpg', 'pants02-Grey.jpg', true, 'pants02')">
                <div class="product-img-box"><img src="pants02-black.jpg" alt="Pants 03"></div>
                <div class="product-details"><div class="product-card-title">COMPRESSION PANTS 03</div></div>
            </div>

        </div>
    </section>

    <!-- المودال الخاص بالمنتجات -->
    <div class="product-modal-overlay" id="productModal" onclick="closeProductModalOnOutsideClick(event)">
        <div class="product-modal-content">
            <button class="close-modal-btn" onclick="closeProductModal()">✕</button>
            <div class="modal-body-layout">
                <div class="modal-images-side">
                    <img id="modalMainImage" src="" alt="Product">
                </div>
                <div class="modal-details-side">
                    <h2 id="modalProductTitle"></h2>
                    <div id="modalProductPrice"></div>
                    
                    <div id="modalColorSection" style="display: none; margin-bottom: 20px;">
                        <div class="size-section-title">Select Color:</div>
                        <div class="modal-sizes-select" id="modalColorsContainer"></div>
                    </div>

                    <div class="size-section-title">Select Size:</div>
                    <div class="modal-sizes-select">
                        <label><input type="radio" name="modal-size" value="M" checked><span>M</span></label>
                        <label><input type="radio" name="modal-size" value="L"><span>L</span></label>
                        <label><input type="radio" name="modal-size" value="XL"><span>XL</span></label>
                    </div>
                    
                    <button class="modal-buy-now-btn" onclick="buyItNowFromModal()">Buy It Now</button>
                </div>
            </div>
        </div>
    </div>

    <!-- كود الجافاسكريبت المحدث -->
    <script>
        let cart = [];

        function openProductModal(id, name, price, frontImg, backImg, isPants = false, pantsPrefix = "") {
            document.getElementById('modalProductTitle').innerText = name;
            document.getElementById('modalProductPrice').innerText = price + " EGP";
            document.getElementById('modalMainImage').src = frontImg;
            
            const colorSection = document.getElementById('modalColorSection');
            const colorContainer = document.getElementById('modalColorsContainer');

            if (isPants) {
                colorSection.style.display = 'block';
                colorContainer.innerHTML = `
                    <label><input type="radio" name="modal-color" value="Black" checked onclick="document.getElementById('modalMainImage').src='${pantsPrefix}-black.jpg'"><span>Black</span></label>
                    <label><input type="radio" name="modal-color" value="Grey" onclick="document.getElementById('modalMainImage').src='${pantsPrefix}-Grey.jpg'"><span>Grey</span></label>
                `;
            } else {
                colorSection.style.display = 'none';
            }

            document.getElementById('productModal').classList.add('active');
        }

        function buyItNowFromModal() {
            const size = document.querySelector('input[name="modal-size"]:checked').value;
            const color = document.querySelector('input[name="modal-color"]:checked') ? document.querySelector('input[name="modal-color"]:checked').value : "N/A";
            const name = document.getElementById('modalProductTitle').innerText;
            
            // إضافة المنتج للكارت مع اللون والمقاس
            cart = [{ name: `${name} (${color})`, size: size, price: 550, qty: 1 }];
            alert("تم إضافة " + name + " باللون " + color + " والمقاس " + size);
            closeProductModal();
        }

        function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }
        function closeProductModalOnOutsideClick(e) { if(e.target.id === 'productModal') closeProductModal(); }
    </script>
</body>
</html>
