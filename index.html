<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Λ И G E Я | Official</title>
    <style>
        /* إعدادات الصفحة */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حاوية السلايد */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* أنيميشن الخلفية */
        .bg-image {
            position: absolute;
            inset: 0;
            background-image: url('bg.jpg'); /* اسم الصورة الخلفية */
            background-size: cover;
            background-position: center;
            z-index: 1;
            animation: kenBurns 10s ease-out forwards;
        }

        /* طبقة سواد */
        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        /* المحتوى النصي واللوجو */
        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ستايل اللوجو */
        .brand-logo {
            max-width: 150px; /* تحكم في حجم اللوجو */
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUpLogo 2s ease-out forwards;
            animation-delay: 0.3s;
        }

        /* أنيميشن الاسم */
        .brand-name {
            font-size: 7vw;
            font-weight: 900;
            margin: 0;
            opacity: 0;
            letter-spacing: 40px;
            filter: blur(10px);
            animation: revealTitle 2.5s cubic-bezier(0.21, 0.6, 0.35, 1) forwards;
            animation-delay: 1s;
        }

        /* أنيميشن الجملة التحتية */
        .tagline {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #888;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUpTagline 2s ease-out forwards;
            animation-delay: 2s;
        }

        /* تعريف الحركات */
        @keyframes kenBurns {
            from { transform: scale(1.2); }
            to { transform: scale(1); }
        }

        @keyframes fadeInUpLogo {
            to {
                opacity: 0.9;
                transform: translateY(0);
            }
        }

        @keyframes revealTitle {
            to { 
                opacity: 1; 
                letter-spacing: 25px; 
                filter: blur(0); 
            }
        }

        @keyframes fadeInUpTagline {
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        <div class="content">
            <img src="logo.png" alt="Λ И G E Я Logo" class="brand-logo">
            
            <h1 class="brand-name">Λ И G E Я</h1>
            <p class="tagline">EVOLUTION IN PROGRESS</p>
        </div>
    </div>

</body>
</html>
