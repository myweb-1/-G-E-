    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* الهيدر واللوجو */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: transparent;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        .nav-logo img {
            height: 50px;
            object-fit: contain;
        }

        /* السلايد الأولى (الواجهة) بكامل مساحة الشاشة */
        .hero-section {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-image: url('hero.png'); /* تأكد أن الصورة مرفوعة باسم hero.png */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* الشريط المتحرك */
        .marquee-bar {
            background: #ffffff;
            color: #000000;
            padding: 12px 0;
            overflow: hidden;
            white-space: nowrap;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* قسم المنتجات تحت السلايد الأولى */
        .collection-section {
            padding: 60px 20px;
            background: #000000;
            text-align: center;
        }

        .collection-title {
            color: #ffffff;
            font-size: 26px;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .product-card {
            background: #0b0c10;
            border: 1px solid #1f2833;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            border-color: #ffffff;
        }

        /* قلب الصور وش وضهر */
        .product-img-box {
            width: 100%;
            height: 400px;
            background: #15191d;
            overflow: hidden;
            position: relative;
        }

        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .img-back {
            opacity: 0;
        }

        .product-card:hover .img-front {
            opacity: 0;
        }

        .product-card:hover .img-back {
            opacity: 1;
            transform: scale(1.02);
        }

        /* تفاصيل المنتج وزر الواتساب */
        .product-details {
            padding: 20px;
            text-align: right;
        }

        .product-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .product-price {
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .product-price span {
            font-size: 14px;
            color: #888;
            text-decoration: line-through;
            font-weight: 400;
        }

        .whatsapp-btn {
            display: block;
            background: #ffffff;
            color: #000000;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid #ffffff;
        }

        .whatsapp-btn:hover {
            background: transparent;
            color: #ffffff;
        }

        /* أزرار التواصل في الفوتر أسفل الصفحة تماماً */
        .action-footer {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 60px 20px;
            background: #000000;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-align: center;
            flex: 1;
            max-width: 200px;
        }

        .btn-white {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .btn-white:hover {
            background: transparent;
            color: #ffffff;
        }

        .btn-dark {
            background: transparent;
            color: #ffffff;
            border-color: #ffffff;
        }

        .btn-dark:hover {
            background: #ffffff;
            color: #000000;
        }

        /* شاشات الموبايل */
        @media (max-width: 480px) {
            .hero-section {
                height: 100vh;
            }
            .product-img-box {
                height: 380px;
            }
            .collection-title {
                font-size: 22px;
            }
        }
    </style>
</head>
