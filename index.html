<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANGER | Horror Clothing Brand</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="nav-menu-btn" id="openMenuBtn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div class="nav-center">
            <span class="nav-brand-text">ANGER</span>
        </div>
        <div class="nav-right"></div>
    </nav>

    <!-- Sidebar Menu -->
    <div class="menu-sidebar" id="menuSidebar">
        <div class="menu-header">
            <button class="close-menu-btn" id="closeMenuBtn">&times;</button>
        </div>
        <div class="menu-links">
            <a href="#">الرئيسية</a>
            <a href="#">التشكيلة الكاملة</a>
            <a href="#" id="openAboutBtn">عن البراند</a>
            <a href="#" id="openFabricBtn">تفاصيل الخامات</a>
        </div>
    </div>

    <!-- Hero Section with Background Marquee Inside -->
    <header class="hero-section">
        <div class="marquee-bar">
            <div class="marquee-content">
                DROP 01: THE ABYSS OUT NOW • شحن سريع لجميع المحافظات • DROP 01: THE ABYSS OUT NOW • 
            </div>
        </div>
    </header>

    <!-- Products Grid (3 Columns) -->
    <main class="collection-section">
        <h2 class="collection-title">THE ABYSS COLLECTION</h2>
        
        <div class="products-grid">
            
            <!-- المنتج الأول -->
            <div class="product-card" onclick="openProductDetail('ANGER OVERSIZED TEE', '650 EGP', 'img-front1.jpg', 'img-back1.jpg')">
                <div class="product-img-box">
                    <img class="img-front" src="img-front1.jpg" alt="Front">
                    <img class="img-back" src="img-back1.jpg" alt="Back">
                </div>
                <div class="product-details">
                    <h3 class="product-card-title">ANGER OVERSIZED TEE</h3>
                    <div class="product-price">650 EGP</div>
                </div>
            </div>

            <!-- المنتج الثاني -->
            <div class="product-card" onclick="openProductDetail('BLOOD SPATTER HOODIE', '950 EGP', 'img-front2.jpg', 'img-back2.jpg')">
                <div class="product-img-box">
                    <img class="img-front" src="img-front2.jpg" alt="Front">
                    <img class="img-back" src="img-back2.jpg" alt="Back">
                </div>
                <div class="product-details">
                    <h3 class="product-card-title">BLOOD SPATTER HOODIE</h3>
                    <div class="product-price">950 EGP</div>
                </div>
            </div>

            <!-- المنتج الثالث -->
            <div class="product-card" onclick="openProductDetail('ABYSS SWEATSHIRT', '750 EGP', 'img-front3.jpg', 'img-back3.jpg')">
                <div class="product-img-box">
                    <img class="img-front" src="img-front3.jpg" alt="Front">
                    <img class="img-back" src="img-back3.jpg" alt="Back">
                </div>
                <div class="product-details">
                    <h3 class="product-card-title">ABYSS SWEATSHIRT</h3>
                    <div class="product-price">750 EGP</div>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
