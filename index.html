    <style>
        .collection-section {
            padding: 60px 20px;
            background: #000000;
            text-align: center;
        }
        .collection-title {
            color: #ffffff;
            font-size: 28px;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 900px; /* ملموم عشان هما منتجين بس */
            margin: 0 auto;
        }
        .product-card {
            background: #0b0c10;
            border: 1px solid #1f2833;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .product-card:hover {
            border-color: #ffffff;
        }
        /* كود حركة قلب الصورة (وش وضهر) */
        .product-img-box {
            width: 100%;
            height: 420px;
            background: #15191d;
            overflow: hidden;
            position: relative;
        }
        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .img-back {
            opacity: 0;
        }
        /* لما يلمس أو يقف بالماوس، الوش يختفي والضهر يظهر */
        .product-card:hover .img-front {
            opacity: 0;
        }
        .product-card:hover .img-back {
            opacity: 1;
            transform: scale(1.02);
        }
        .product-details {
            padding: 20px;
            text-align: right;
        }
        .product-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .product-price {
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .product-price span {
            font-size: 14px;
            color: #888;
            text-decoration: line-through;
            font-weight: 400;
        }
        .whatsapp-btn {
            display: block;
            background: #ffffff;
            color: #000000;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid #ffffff;
        }
        .whatsapp-btn:hover {
            background: transparent;
            color: #ffffff;
        }
        .hero-section {
            min-height: 50vh;
        }
    </style>
</head>

    </div>

            <div class="product-card">
                <div class="product-img-box">

                    <img src="prod1-back.jpg" alt="تيشيرت كومبريشن رياضي من الخلف - Λ И G E Я" class="img-back">
                </div>
                <div class="product-details">
                    <h3 class="product-name">Λ И G E Я - DROP 01</h3>

            </div>

            <div class="product-card">
                <div class="product-img-box">
                    <img src="prod2-front.jpg" alt="تيشيرت راش جارد للجيم من الأمام - Λ И G E Я" class="img-front">
                    <img src="prod2-back.jpg" alt="تيشيرت راش جارد للجيم من الخلف - Λ И G E Я" class="img-back">

                <div class="product-details">

                    <div class="product-price">450 EGP <span>550 EGP</span></div>
