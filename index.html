<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Λ И G E Я | Official</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* منع التمرير تماماً لمنح إحساس التطبيق */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            inset: 0;
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
            /* أنيميشن الدخول الهادئ للخلفية */
            animation: kenBurns 15s ease-out forwards;
        }

        .overlay {
            position: absolute;
            inset: 0;
            /* تدرج لوني أقوى لضمان وضوح اللوجو الأبيض */
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .brand-logo {
            width: 140px; /* حجم ثابت ومناسب للموبايل */
            height: auto;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.5s ease-out forwards;
            animation-delay: 0.5s;
        }

        .brand-name {
            /* تعديل الـ vw ليناسب الشاشات الصغيرة جداً دون كسر الكلمة */
            font-size: clamp(2rem, 10vw, 5rem); 
            font-weight: 900;
            margin: 0;
            opacity: 0;
            letter-spacing: 12px; /* تقليل المسافة قليلاً للموبايل */
            text-indent: 12px; /* لموازنة الكلمة في النص */
            filter: blur(10px);
            animation: revealTitle 2s cubic-bezier(0.21, 0.6, 0.35, 1) forwards;
            animation-delay: 1.2s;
            white-space: nowrap; /* يمنع الحروف تنزل سطر جديد */
        }

        .tagline {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #aaa;
            margin-top: 25px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s ease-out forwards;
            animation-delay: 2.2s;
        }

        /* --- التحسينات الخاصة بالشاشات الكبيرة (الكمبيوتر) --- */
        @media (min-width: 768px) {
            .brand-name {
                font-size: 6vw;
                letter-spacing: 25px;
                text-indent: 25px;
            }
            .brand-logo {
                width: 180px;
            }
            .tagline {
                font-size: 14px;
                letter-spacing: 10px;
            }
        }

        /* أنيميشن موحد للدخول */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes revealTitle {
            to { opacity: 1; filter: blur(0); }
        }

        @keyframes kenBurns {
            from { transform: scale(1.2); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        <div class="content">
            <img src="logo.png" alt="Anger Logo" class="brand-logo">
            <h1 class="brand-name">Λ И G E Я</h1>
            <p class="tagline">EVOLUTION IN PROGRESS</p>
        </div>
    </div>

</body>
</html>
