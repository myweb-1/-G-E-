<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Λ И G E Я</title>
    <meta name="description" content="Anger Studio - The premier Egyptian brand specialized in athletic compression t-shirts.">
    <link rel="canonical" href="https://www.anger-wear.com/">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- تم تحديث الهيكل البرمجي ليتوافق مع العمل عبر GitHub مباشرة -->

    <nav class="navbar">
        <div class="nav-left">
            <div class="nav-menu-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div class="nav-center">
            <div class="nav-brand-text">Λ И G E Я</div>
        </div>
        <div class="nav-right"></div>
    </nav>

    <!-- باقي المحتوى كما هو مع مراعاة تحديث روابط الصور والمسارات -->

    <div class="checkout-overlay" id="checkoutOverlay">
        <div class="checkout-modal">
            <h3>Order Shipping Details</h3>
            <form id="orderForm" action="https://formspree.io/f/xgoqadvg" method="POST" onsubmit="sendOrder(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="clientName" name="clientName" required placeholder="John Doe...">
                </div>
                <!-- الحقول المحدثة لنقل تفاصيل المنتج والصور -->
                <input type="hidden" id="orderedProductsDetails" name="productsDetails">
                <input type="hidden" id="orderedProductsImages" name="productsImages">
                
                <button type="submit" class="submit-order-btn">Submit Order</button>
            </form>
        </div>
    </div>

    <script>
        // تعديل دالة الإرسال لضمان انتقال بيانات المنتج والصور
        function sendOrder(event) {
            const cartDetails = cart.map(item => `${item.name} (Size: ${item.size}, Qty: ${item.qty})`).join(', ');
            const cartImages = cart.map(item => item.name).join(', '); // إرسال أسماء المنتجات كمرجع للصور
            
            document.getElementById('orderedProductsDetails').value = cartDetails;
            document.getElementById('orderedProductsImages').value = cartImages;
        }

        // باقي الدوال البرمجية...
    </script>
</body>
