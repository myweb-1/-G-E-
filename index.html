<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Λ И G E Я | Official</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow-x: hidden; /* يمنع الهز يمين وشمال في الموبايل */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-image {
            position: absolute;
            inset: 0;
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
            animation: kenBurns 10s ease-out forwards;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%; /* عشان ميبقاش لازق في الحواف في الموبايل */
        }

        .brand-logo {
            max-width: 120px; /* أصغر شوية للموبايل */
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUpLogo 2s ease-out forwards;
            animation-delay: 0.3s;
        }

        /* تعديل الاسم */
        .brand-name {
            font-size: 12vw; /* حجم ديناميكي يكبر ويصغر مع الشاشة */
            font-weight: 900;
            margin: 0;
            opacity: 0;
            letter-spacing: 15px; /* قللنا المسافة شوية للموبايل */
            filter: blur(10px);
            animation: revealTitle 2.5s cubic-bezier(0.21, 0.6, 0.35, 1) forwards;
            animation-delay: 1s;
        }

        .tagline {
            font-size: 10px; /* أصغر للموبايل */
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #888;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUpTagline 2s ease-out forwards;
            animation-delay: 2s;
        }

        /* --- شاشات الكمبيوتر الكبيرة --- */
        @media (min-width: 768px) {
            .brand-name {
                font-size: 7vw;
                letter-spacing: 25px;
            }
            .brand-logo {
                max-width: 150px;
            }
            .tagline {
                font-size: 14px;
                letter-spacing: 8px;
            }
        }

        /* الأنيميشنز */
        @keyframes kenBurns {
            from { transform: scale(1.15); }
            to { transform: scale(1); }
        }
        @keyframes fadeInUpLogo {
            to { opacity: 0.9; transform: translateY(0); }
        }
        @keyframes revealTitle {
            to { opacity: 1; filter: blur(0); }
        }
        @keyframes fadeInUpTagline {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="bg-image"></div>
        <div class="overlay"></div>
        <div class="content">
            <img src="logo.png" alt="Logo" class="brand-logo">
            <h1 class="brand-name">Λ И G E Я</h1>
            <p class="tagline">EVOLUTION IN PROGRESS</p>
        </div>
    </div>

</body>
</html>
